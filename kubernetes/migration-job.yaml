apiVersion: batch/v1
kind: Job
metadata:
  name: django-migration
spec:
  template:
    spec:
      containers:
      - name: migration
        image: my-django-app:v1
        imagePullPolicy: Never
        command: ["python", "manage.py", "migrate"]
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:password123@postgres-service:5432/postgres"
      restartPolicy: Never

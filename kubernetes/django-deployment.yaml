apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
spec:
  replicas: 2 # This shows "Scaling" - running two instances at once
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
      - name: django
        image: my-django-app:v1 # The name from your April 6th Lab
        imagePullPolicy: Never # Critical for Kind/Codespaces to use local images
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:password123@postgres-service:5432/postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
spec:
  type: NodePort
  selector:
    app: django
  ports:
  - port: 8000
    targetPort: 8000
